<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Latvia · flag animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #2d4a3b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Segoe UI', cursive, sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* cartoon paper effect */
        .paper {
            background: #fbf3d5;
            padding: 30px 20px 20px 20px;
            border-radius: 80px 80px 40px 40px;
            box-shadow: 0 20px 0 #ac8e68, 0 30px 30px rgba(0,0,0,0.4), inset 0 -8px 0 #e3c9a0;
            border: 6px solid #ffcf9a;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: rotate(0.5deg);
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            color: #471c0c;
            text-shadow: 4px 4px 0 #ffb882, 6px 6px 0 #7b4f2e;
            margin-top: -15px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            word-break: break-word;
            text-align: center;
            line-height: 1.1;
            transform: rotate(-1deg);
        }

        h1 span {
            background: #fef5af;
            padding: 0 25px;
            border-radius: 100px;
            display: inline-block;
            border: 4px solid #ca762b;
            box-shadow: 0 6px 0 #985f28;
        }

        /* flag container with hand-drawn border */
        .flag-container {
            position: relative;
            width: 960px;      /* 12 columns * 80px */
            height: 500px;      /* 5 rows * 100px */
            background: linear-gradient(
                180deg,
                #C8372D 0%,
                #C8372D 40%,
                #FFFFFF 40%,
                #FFFFFF 60%,
                #C8372D 60%,
                #C8372D 100%
            );
            border-radius: 50px 50px 30px 30px;
            box-shadow: 0 12px 0 #6e3c1d, 0 18px 25px black, inset 0 -8px 0 #ffb27e, inset 0 8px 10px #ffe395;
            border: 8px solid #ffb156;
            margin-bottom: 25px;
            image-rendering: crisp-edges;
            overflow: hidden;
        }

        /* cartoon symbol style */
        .cartoon {
            position: absolute;
            left: 0;
            top: 0;
            font-size: 42px;          /* big & cartoony */
            line-height: 1;
            white-space: nowrap;
            text-shadow: 3px 3px 0 #33333380, 0 0 10px #fff9d0;
            filter: drop-shadow(0 6px 3px rgba(0,0,0,0.3));
            transition: left 1.2s cubic-bezier(0.34, 1.7, 0.64, 1.2),    /* bounce */
                        top 1.2s cubic-bezier(0.34, 1.7, 0.64, 1.2),
                        transform 1s ease-out;
            will-change: left, top, transform;
            pointer-events: none;
            transform-origin: center;
            opacity: 0.97;
        }

        /* slight variation for symbols on white stripe – add a thin outline */
        .cartoon.white-bg {
            filter: drop-shadow(3px 3px 0 #33333380) drop-shadow(0 0 6px #ffb47b);
        }

        .cartoon.red-bg {
            filter: drop-shadow(3px 3px 0 #1f0e00) drop-shadow(0 0 8px #ffeaa0);
        }

        /* extra cartoon wiggle on hover (just for fun) */
        .flag-container:hover .cartoon {
            animation: wobble 0.4s infinite alternate ease-in-out;
        }

        @keyframes wobble {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) rotate(2deg) scale(1.05); }
        }

        /* button with cartoon style */
        .controls button {
            background: #fedb9f;
            border: 6px solid #d48d4b;
            padding: 18px 50px;
            font-size: 2.4rem;
            font-weight: bold;
            font-family: 'Comic Neue', cursive;
            border-radius: 120px;
            color: #2a1b0c;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 12px 0 #9f6a3a, 0 14px 15px black;
            cursor: pointer;
            transition: 0.1s ease-out;
            transform: rotate(-1deg);
        }

        .controls button:hover {
            background: #ffeab3;
            transform: translateY(-4px) rotate(-1deg);
            box-shadow: 0 16px 0 #9f6a3a, 0 18px 25px black;
        }

        .controls button:active {
            transform: translateY(8px) rotate(-1deg);
            box-shadow: 0 6px 0 #7a4f28, 0 12px 20px black;
        }

        .footer-note {
            font-size: 1.8rem;
            color: #482708;
            background: #ffdbb5;
            padding: 10px 40px;
            border-radius: 60px;
            margin-top: 20px;
            border: 4px solid #af6d33;
            font-weight: 600;
            box-shadow: inset 0 -4px 0 #bd8b54;
        }

        .footer-note strong {
            color: #b1302a;
            font-size: 2rem;
        }
    </style>
</head>
<body>
<div class="paper">
    <h1><span>✨ KARTOONI ✨</span></h1>
    <div id="flag" class="flag-container"></div>
    <div class="controls">
        <button id="animateBtn">🎬 SAJAUCT & SAVIET</button>
    </div>
    <div class="footer-note">latvijas <strong>🇱🇻 karogs</strong> no jautriem simboliem</div>
</div>

<script>
(function() {
    // ----- 30+ cartoonish emoji / symbols (Latvian flavour + playful) -----
    const cartoonPool = [
        "🐻", "🌲", "☀️", "🦉", "🏰", "🎵", "🇱🇻", "🌾", "🐺", "🦌",
        "🐟", "🚣", "🌸", "🍂", "❄️", "⚽", "🎨", "📚", "🏡", "🍞",
        "🧀", "🐕", "🐈", "🦆", "🐝", "🐞", "🌟", "🌙", "🌿", "🏹",
        "🧸", "🍄", "🥨", "☕", "🎠", "💃", "🪕", "🥁", "🌻", "🐿️",
        "🦊", "🦫", "🦢", "🐜", "⛪", "🏞️", "🚲", "🧣", "🧦", "🧤"
    ]; // more than enough

    // we need 60 symbols (12 columns x 5 rows)
    const TOTAL_CELLS = 60;
    const COL_COUNT = 12;
    const ROW_COUNT = 5;   // 2 red / 1 white / 2 red

    // make an array of 60 cartoons, repeat and shuffle
    function generateCartoonSet() {
        let items = [];
        while (items.length < TOTAL_CELLS) {
            // random pick from pool (with replacement) to get variety
            const randomIndex = Math.floor(Math.random() * cartoonPool.length);
            items.push(cartoonPool[randomIndex]);
        }
        // shuffle again to mix well
        return shuffleArray(items);
    }

    // shuffle utility
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ----- create grid positions (row, col) for 5x12 -----
    function generateGridPositions() {
        const positions = [];
        for (let r = 0; r < ROW_COUNT; r++) {
            for (let c = 0; c < COL_COUNT; c++) {
                positions.push({ row: r, col: c });
            }
        }
        return positions;  // 60 positions
    }

    const container = document.getElementById('flag');
    let cellW, cellH;
    let cartoonElements = [];

    // ----- initialise / reset everything -----
    function initCartoonFlag() {
        container.innerHTML = '';
        cartoonElements = [];

        const containerRect = container.getBoundingClientRect();
        cellW = containerRect.width / COL_COUNT;
        cellH = containerRect.height / ROW_COUNT;

        // generate target positions in order (row by row)
        const gridPositions = generateGridPositions(); // length 60

        // get 60 cartoon symbols (shuffled)
        let cartoons = generateCartoonSet(); // array of 60 emoji

        // assign each position a cartoon (preserve order but we shuffle assignments later)
        let assignments = gridPositions.map((pos, idx) => ({
            symbol: cartoons[idx],
            row: pos.row,
            col: pos.col,
        }));

        // group by stripe to mix symbols randomly within each stripe
        const topRed = assignments.filter(a => a.row === 0 || a.row === 1);
        const white = assignments.filter(a => a.row === 2);
        const bottomRed = assignments.filter(a => a.row === 3 || a.row === 4);

        shuffleArray(topRed);
        shuffleArray(white);
        shuffleArray(bottomRed);

        // combine back in stripe order (top red, white, bottom red)
        const finalAssignments = [...topRed, ...white, ...bottomRed];

        // now create DOM elements
        finalAssignments.forEach((item, index) => {
            const span = document.createElement('span');
            span.className = 'cartoon';
            span.textContent = item.symbol;

            // add a modifier class based on stripe (for slight filter difference)
            if (item.row === 2) {
                span.classList.add('white-bg');   // on white stripe
            } else {
                span.classList.add('red-bg');     // on red stripe
            }

            // target coordinates (center of cell)
            const targetLeft = item.col * cellW + cellW / 2;
            const targetTop = item.row * cellH + cellH / 2;

            // store target in dataset
            span.dataset.targetLeft = targetLeft;
            span.dataset.targetTop = targetTop;
            span.dataset.targetRow = item.row;

            // random initial position (anywhere inside container)
            const randomLeft = Math.random() * containerRect.width;
            const randomTop = Math.random() * containerRect.height;
            // random rotation (-30deg .. 30deg) & scale (0.7..1.6) for messy look
            const rot = (Math.random() * 60 - 30);
            const scale = 0.7 + Math.random() * 0.9;
            span.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(${scale})`;

            // set initial left/top (no transition for instant set)
            span.style.transition = 'none';
            span.style.left = randomLeft + 'px';
            span.style.top = randomTop + 'px';

            container.appendChild(span);
            cartoonElements.push(span);
        });

        // force reflow to clear transition
        void container.offsetHeight;

        // apply transitions after a tiny tick
        setTimeout(() => {
            cartoonElements.forEach(el => {
                el.style.transition = 'left 1.2s cubic-bezier(0.34, 1.7, 0.64, 1.2), top 1.2s cubic-bezier(0.34, 1.7, 0.64, 1.2), transform 1s ease-out';
            });
        }, 20);

        // auto‑move to flag after 1.2 sec (so user sees chaos first)
        setTimeout(() => {
            moveToFlag();
        }, 1200);
    }

    // ----- function: move all cartoons to target positions (flag) -----
    function moveToFlag() {
        cartoonElements.forEach((el, idx) => {
            const targetLeft = parseFloat(el.dataset.targetLeft);
            const targetTop = parseFloat(el.dataset.targetTop);

            // add staggered delay (max 0.5s) for wave effect
            const delay = (idx % 12) * 0.02;  // column-based delay
            el.style.transitionDelay = `${delay}s, ${delay}s, 0s`; // left, top, transform

            // set target left & top
            el.style.left = targetLeft + 'px';
            el.style.top = targetTop + 'px';
            // final transform: centered, no rotation, normal scale 1
            el.style.transform = 'translate(-50%, -50%) rotate(0deg) scale(1)';
        });
    }

    // ----- scatter them randomly again (but with transition to make it playful) -----
    function scatterCartoons() {
        const containerW = container.clientWidth;
        const containerH = container.clientHeight;

        cartoonElements.forEach((el, idx) => {
            // reset transition delay to zero for immediate movement
            el.style.transitionDelay = '0s, 0s, 0s';

            const randomLeft = Math.random() * containerW;
            const randomTop = Math.random() * containerH;
            const rot = (Math.random() * 60 - 30);
            const scale = 0.6 + Math.random() * 1.0;
            el.style.left = randomLeft + 'px';
            el.style.top = randomTop + 'px';
            el.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(${scale})`;
        });
    }

    // ----- button handler: scatter then reassemble after short delay -----
    function handleButton() {
        scatterCartoons();
        // after scattering, call moveToFlag after a moment
        setTimeout(() => {
            moveToFlag();
        }, 700); // 0.7 sec of chaotic scatter then reassemble
    }

    // ----- start everything on load -----
    window.addEventListener('load', () => {
        initCartoonFlag();

        const btn = document.getElementById('animateBtn');
        btn.addEventListener('click', handleButton);
    });

    // optional: if window resizes, we might need to recalc? but for demo we keep fixed size.
    // but we can add a simple resize recalc? – we'll keep it fixed to avoid complexity.
    // if you resize, reload.
})();
</script>
</body>
</html>
